var ENGFIT_SUBMIT_URL = "https://script.google.com/macros/s/AKfycbz5IC3cEtaBGW10qZhrjwtjdtGugmcmYb4ZTHS4k-1LOqTRYzW-LfoAPyFB_ShjAqNp/exec";

async function engfitSubmit(r) {
  var body = JSON.stringify(r);
  try {
    var res = await fetch(ENGFIT_SUBMIT_URL, { method: "POST", body: body });
    var j = await res.json();
    return j.ok === true;
  } catch (e) {
    try {
      await fetch(ENGFIT_SUBMIT_URL, { method: "POST", mode: "no-cors", body: body });
      return true;
    } catch (e2) { return false; }
  }
}

var _engfitSent = false;
async function engfitSubmitWithStatus(r) {
  if (_engfitSent) return; _engfitSent = true;
  var el = document.getElementById("submit-status");
  el.textContent = "결과 전송 중...";
  el.style.color = "#888";

var QUIZ_ID = "clinic-kimdaeyun-0707";
var QUIZ_TITLE = "김대윤 오답 클리닉 · 동명사와 to부정사";

/* ══════ 진행 로직 ══════ */
var studentName = "";
var current = 0;
var correctCount = 0;
var wrongNumbers = [];
var answersLog = [];
var startTime = 0;

var nameInput = document.getElementById("name-input");
var startBtn = document.getElementById("start-btn");

nameInput.addEventListener("input", function () {
  startBtn.disabled = nameInput.value.trim().length === 0;
});
nameInput.addEventListener("keydown", function (e) {
  if (e.key === "Enter" && nameInput.value.trim().length > 0) startBtn.click();
});

startBtn.addEventListener("click", function () {
  studentName = nameInput.value.trim();
  if (!studentName) return;
  startTime = Date.now();
  document.getElementById("start-card").classList.add("hidden");
  document.getElementById("quiz-card").classList.remove("hidden");
  showQuestion();
});

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

var CIRCLED = ["①", "②", "③", "④", "⑤"];
var currentButtons = [];

function showQuestion() {
  var q = QUESTIONS[current];
  document.getElementById("progress").textContent = "문제 " + (current + 1) + " / " + QUESTIONS.length;
  document.getElementById("secnow").textContent = q.sec;
  document.getElementById("barfill").style.width = ((current) / QUESTIONS.length * 100) + "%";
  document.getElementById("origin").textContent = "🔎 " + q.origin;
  document.getElementById("qtext").innerHTML = "Q" + (current + 1) + ". " + q.q;
  var box = document.getElementById("choices");
  box.innerHTML = "";
  currentButtons = [];
  shuffle(q.choices).forEach(function (c, i) {
    var b = document.createElement("button");
    b.className = "choice";
    b.innerHTML = '<span class="num">' + CIRCLED[i] + "</span>" + c;
    b.addEventListener("click", function () { pick(c); });
    box.appendChild(b);
    currentButtons.push(c);
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.addEventListener("keydown", function (e) {
  if (document.getElementById("quiz-card").classList.contains("hidden")) return;
  var n = parseInt(e.key, 10);
  if (n >= 1 && n <= currentButtons.length) pick(currentButtons[n - 1]);
});

var locked = false;
function pick(choice) {
  if (locked) return; locked = true;
  var q = QUESTIONS[current];
  var ok = choice === q.answer;
  if (ok) correctCount++;
  else wrongNumbers.push(current + 1);
  answersLog.push({ no: current + 1, ok: ok, chosen: choice, answer: q.answer });
  setTimeout(function () {
    locked = false;
    current++;
    if (current < QUESTIONS.length) showQuestion();
    else showResult();
  }, 250);
}

function showResult() {
  document.getElementById("quiz-card").classList.add("hidden");
  document.getElementById("result-card").classList.remove("hidden");
  document.getElementById("score-line").textContent = correctCount + " / " + QUESTIONS.length;
  var pct = Math.round(correctCount / QUESTIONS.length * 100);
  document.getElementById("score-sub").textContent = "정답률 " + pct + "% · 틀린 문제 " + wrongNumbers.length + "개";

  var expBox = document.getElementById("explanations");
  var lastSec = "";
  QUESTIONS.forEach(function (q, i) {
    if (q.sec !== lastSec) {
      var dv = document.createElement("div");
      dv.className = "divider";
      dv.textContent = q.sec;
      expBox.appendChild(dv);
      lastSec = q.sec;
    }
    var log = answersLog[i];
    var d = document.createElement("div");
    d.className = "exp" + (log.ok ? "" : " wrong");
    var head = log.ok
      ? '<div class="head ok">Q' + (i + 1) + '. 정답! ✓</div>'
      : '<div class="head no">Q' + (i + 1) + '. 다시 봐요 <span class="oc">(내 답: ' + log.chosen + ' → 정답: ' + q.answer + ')</span></div>';
    d.innerHTML = head + q.exp;
    expBox.appendChild(d);
  });

  engfitSubmitWithStatus({
    quizId: QUIZ_ID,
    quizTitle: QUIZ_TITLE,
    student: studentName,
    score: correctCount,
    total: QUESTIONS.length,
    wrong: wrongNumbers,
    durationSec: Math.round((Date.now() - startTime) / 1000),
    detail: answersLog
  });
}

document.getElementById("kakao-btn").addEventListener("click", function () {
  var pct = Math.round(correctCount / QUESTIONS.length * 100);
  var msg = "[영핏 오답 클리닉 결과]\n" + QUIZ_TITLE +
            "\n학생: " + studentName +
            "\n점수: " + correctCount + "/" + QUESTIONS.length + " (" + pct + "%)" +
            "\n틀린 문항: " + (wrongNumbers.length ? wrongNumbers.join(", ") : "없음") +
            "\n\n- 영핏 지나티처";
  navigator.clipboard.writeText(msg).then(function () {
    document.getElementById("kakao-btn").textContent = "복사 완료! 카톡에 붙여넣기 하세요 ✓";
  }).catch(function () {
    prompt("아래 내용을 길게 눌러 복사하세요", msg);
  });
});
